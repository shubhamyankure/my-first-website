```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Electronics Components Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1f2937;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

#search{
padding:8px;
width:250px;
border-radius:5px;
border:none;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111827;
color:white;
padding:20px;
overflow:auto;
}

.cartItem{
border-bottom:1px solid gray;
padding:8px 0;
}

</style>
</head>

<body>

<header>

<h1>Electronics Store</h1>

<input id="search" placeholder="Search component..." onkeyup="searchProduct()">

</header>

<div class="container" id="products">

<div class="card" data-name="resistor">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Resistors.jpg">
<h3>1K Resistor Pack</h3>
<p>10 pcs</p>
<p class="price">₹10</p>
<button onclick="add('1K Resistor Pack',10)">Add to Cart</button>
</div>

<div class="card" data-name="arduino">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/38/Arduino_Uno_-_R3.jpg">
<h3>Arduino UNO</h3>
<p class="price">₹350</p>
<button onclick="add('Arduino UNO',350)">Add to Cart</button>
</div>

<div class="card" data-name="sensor">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/HC-SR04_Ultrasonic_Sensor.jpg">
<h3>Ultrasonic Sensor</h3>
<p class="price">₹80</p>
<button onclick="add('Ultrasonic Sensor',80)">Add to Cart</button>
</div>

<div class="card" data-name="motor">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/DC_Motor.jpg">
<h3>DC Motor</h3>
<p class="price">₹120</p>
<button onclick="add('DC Motor',120)">Add to Cart</button>
</div>

</div>

<div id="cart">

<h2>Cart</h2>

<div id="cartList"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button onclick="sendOrder()">Order via WhatsApp</button>

</div>

<script>

let cart=[]

function add(name,price){

let item=cart.find(i=>i.name==name)

if(item){
item.qty++
}else{
cart.push({name,price,qty:1})
}

render()

}

function render(){

let box=document.getElementById("cartList")

box.innerHTML=""

let total=0

cart.forEach(i=>{

let div=document.createElement("div")

div.className="cartItem"

div.innerHTML=i.name+" x"+i.qty+" ₹"+(i.qty*i.price)

box.appendChild(div)

total+=i.qty*i.price

})

document.getElementById("total").innerText=total

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(c=>{

let name=c.getAttribute("data-name")

if(name.includes(input)){
c.style.display="block"
}else{
c.style.display="none"
}

})

}

function sendOrder(){

let msg="Electronics Order%0A"

cart.forEach(i=>{
msg+=i.name+" x"+i.qty+" ₹"+(i.price*i.qty)+"%0A"
})

msg+="Total ₹"+document.getElementById("total").innerText

window.open("https://wa.me/917276057489?text="+msg)

}

</script>

</body>
</html>
