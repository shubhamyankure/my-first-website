```html
<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:30px;
}

button{
background:#22c55e;
border:none;
padding:10px 16px;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

input{
padding:8px;
width:250px;
border-radius:5px;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Complete Your Payment</h1>

<h3 id="order"></h3>

<img id="qr" width="220">

<br><br>

<button onclick="payUPI()">Open UPI App</button>

<h3>After Payment</h3>

<p>Enter your UPI Transaction ID</p>

<input id="txid" placeholder="Transaction ID">

<br>

<button onclick="confirmPayment()">Confirm Payment</button>

<script>

let data=JSON.parse(localStorage.getItem("order"))

let orderID="ORD-"+Math.floor(Math.random()*999999)

document.getElementById("order").innerText="Order ID: "+orderID+" | Total ₹"+data.total

let upi="upi://pay?pa=7276057489@ybl&pn=ElectronicsStore&tn="+orderID+"&am="+data.total+"&cu=INR"

let qr="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+encodeURIComponent(upi)

document.getElementById("qr").src=qr


function payUPI(){
window.location.href=upi
}


function confirmPayment(){

let tx=document.getElementById("txid").value

if(tx.length<5){

alert("Enter valid transaction ID")

return

}

let msg="Payment Confirmation%0A"+
"Order ID:"+orderID+
"%0ATransaction ID:"+tx+
"%0ATotal ₹"+data.total+
"%0AName:"+data.name+
"%0APhone:"+data.phone+
"%0AAddress:"+data.address

window.open("https://wa.me/917276057489?text="+msg)

alert("Order sent to seller for verification")

}

</script>

</body>
</html>
