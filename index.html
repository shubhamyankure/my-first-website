<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Arduino Project Store</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

nav{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
padding:8px;
border-radius:6px;
border:none;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:6px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:40px;
text-decoration:none;
}

</style>

</head>

<body>

<nav>

<h2>Arduino Projects</h2>

<input id="search" class="search" placeholder="Search project..." onkeyup="searchProduct()">

let container=document.querySelector(".container")

projects.forEach(p=>{

</div>`
})

function getInfo(product){

let msg="Hi I want information about "+product

window.open("https://wa.me/917276057489?text="+encodeURIComponent(msg))

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(c=>{

let name=c.getAttribute("data-name")

if(name.includes(input)){
c.style.display="block"
}else{
c.style.display="none"
}

})

}
